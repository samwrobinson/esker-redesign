<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metal Vista Roofing — 6-Month Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }
  .mv-wrap {
    font-family: Georgia, 'Times New Roman', serif;
    padding: 28px 24px 20px;
    max-width: 780px;
    margin: 0 auto;
  }
  .mv-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5a7a3a;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .mv-value {
    font-size: 38px;
    font-weight: 700;
    color: #1c3010;
    letter-spacing: -1px;
    line-height: 1;
    font-family: Georgia, serif;
  }
  .mv-sub {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    color: #7a9a5a;
    margin-top: 6px;
  }
  .mv-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: #c8dfa8;
    border: 1px solid #c8dfa8;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .mv-cell {
    background: #f4f9ee;
    padding: 22px 20px 18px;
  }
  .mv-cell.accent {
    background: #2c5c1a;
  }
  .mv-cell.accent .mv-label { color: #9ccf70; }
  .mv-cell.accent .mv-value { color: #ffffff; }
  .mv-cell.accent .mv-sub { color: #78b048; }
  .mv-footer {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    color: #8aaa6a;
    text-align: center;
    letter-spacing: 0.05em;
    padding-top: 4px;
  }
  @media (max-width: 560px) {
    .mv-grid { grid-template-columns: 1fr 1fr; }
    .mv-value { font-size: 30px; }
  }
</style>
</head>
<body>
<div class="mv-wrap">
  <div class="mv-grid">
    <div class="mv-cell accent">
      <div class="mv-label">Total clicks</div>
      <div class="mv-value">190</div>
      <div class="mv-sub">real inbound visits</div>
    </div>
    <div class="mv-cell">
      <div class="mv-label">Total impressions</div>
      <div class="mv-value">11.9K</div>
      <div class="mv-sub">times shown in search</div>
    </div>
    <div class="mv-cell">
      <div class="mv-label">Avg CTR</div>
      <div class="mv-value">1.6%</div>
      <div class="mv-sub">and climbing</div>
    </div>
    <div class="mv-cell">
      <div class="mv-label">Avg position</div>
      <div class="mv-value">31.4</div>
      <div class="mv-sub">still moving up</div>
    </div>
  </div>
  <div class="mv-footer">6-month window &nbsp;·&nbsp; Sept 15, 2025 – Mar 14, 2026 &nbsp;·&nbsp; brand new website from scratch</div>
</div>
</body>
</html>
