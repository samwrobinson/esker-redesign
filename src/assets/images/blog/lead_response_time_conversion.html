
<div style="padding: 0 0 1rem;">
  <div style="display:flex;gap:12px;margin-bottom:16px;">
    <div style="flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;">Response within 5 min</div>
      <div style="font-size:26px;font-weight:500;color:var(--color-text-success);">9x</div>
      <div style="font-size:12px;color:var(--color-text-secondary);">more likely to close the job</div>
    </div>
    <div style="flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;">Average contractor response</div>
      <div style="font-size:26px;font-weight:500;">4–6 hrs</div>
      <div style="font-size:12px;color:var(--color-text-secondary);">by then, the job is usually gone</div>
    </div>
    <div style="flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;">Lead goes cold after</div>
      <div style="font-size:26px;font-weight:500;color:var(--color-text-danger);">30 min</div>
      <div style="font-size:12px;color:var(--color-text-secondary);">conversion drops sharply</div>
    </div>
  </div>

  <div style="position:relative;width:100%;height:260px;">
    <canvas id="responseChart"></canvas>
  </div>

  <div style="display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--color-text-secondary);justify-content:center;">
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;display:inline-block;"></span>Relative close rate</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:3px;background:var(--color-border-secondary);display:inline-block;"></span>Industry average response window</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ctx = document.getElementById('responseChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['< 5 min', '5–30 min', '30–60 min', '1–4 hrs', '4–24 hrs', '24+ hrs'],
    datasets: [{
      label: 'Relative close rate',
      data: [90, 52, 36, 22, 10, 4],
      backgroundColor: ['#1D9E75','#5DCAA5','#9FE1CB','#B4B2A9','#888780','#5F5E5A'],
      borderRadius: 5,
      borderSkipped: false
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => ' Close rate index: ' + ctx.parsed.y
        }
      },
      annotation: {}
    },
    scales: {
      y: {
        beginAtZero: true,
        max: 100,
        grid: { color: 'rgba(136,135,128,0.15)' },
        ticks: {
          color: '#888780',
          font: { size: 11 },
          callback: (v) => v
        },
        title: { display: true, text: 'Relative close rate (index)', color: '#888780', font: { size: 11 } }
      },
      x: {
        grid: { display: false },
        ticks: { color: '#888780', font: { size: 11 } },
        title: { display: true, text: 'Time to first response', color: '#888780', font: { size: 11 } }
      }
    }
  }
});
</script>
