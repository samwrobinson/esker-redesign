<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 20px; font-family: system-ui, sans-serif; background: #fff; }
  .wrap { max-width: 680px; margin: 0 auto; }
  .annotation { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .note { font-size: 12px; color: #5F5E5A; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
  .stat { background: #F1EFE8; border-radius: 8px; padding: 12px; }
  .stat .label { font-size: 11px; color: #888780; margin: 0 0 4px; }
  .stat .value { font-size: 20px; font-weight: 500; color: #2C2C2A; margin: 0; }
  .stat .sub { font-size: 11px; color: #5F5E5A; margin: 2px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stats">
    <div class="stat">
      <p class="label">impressions (June 2025)</p>
      <p class="value">629</p>
      <p class="sub">before GBP management</p>
    </div>
    <div class="stat">
      <p class="label">impressions (March 2026)</p>
      <p class="value">3,552</p>
      <p class="sub">6 months later</p>
    </div>
    <div class="stat">
      <p class="label">position improvement</p>
      <p class="value">53 → 25</p>
      <p class="sub">avg ranking position</p>
    </div>
  </div>

  <div style="position:relative;width:100%;height:300px;margin-top:20px;">
    <canvas id="chart"></canvas>
  </div>

  <div style="display:flex;gap:20px;margin-top:10px;flex-wrap:wrap;">
    <div class="annotation">
      <div class="dot" style="background:#378ADD;"></div>
      <span class="note">Monthly impressions</span>
    </div>
    <div class="annotation">
      <div class="dot" style="background:#E24B4A;border-radius:0;width:20px;height:2px;"></div>
      <span class="note">GBP management begins</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
const impressions = [629, 1814, 1964, 1378, 1375, 1828, 1954, 2057, 2332, 3552];
const clicks = [15, 29, 34, 23, 34, 37, 25, 29, 33, 52];

const gbpLinePlugin = {
  id: 'gbpLine',
  afterDraw: function(chart) {
    const meta = chart.getDatasetMeta(0);
    if (!meta.data[3] || !meta.data[4]) return;
    const x = (meta.data[3].x + meta.data[4].x) / 2;
    const yTop = chart.chartArea.top;
    const yBot = chart.chartArea.bottom;
    const ctx = chart.ctx;
    ctx.save();
    ctx.strokeStyle = '#E24B4A';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(x, yTop);
    ctx.lineTo(x, yBot);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#E24B4A';
    ctx.font = '11px system-ui, sans-serif';
    ctx.fillText('GBP management starts', x + 6, yTop + 16);
    ctx.restore();
  }
};

new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      {
        label: 'Impressions',
        data: impressions,
        backgroundColor: labels.map((l,i) => i >= 4 ? '#378ADD' : '#B5D4F4'),
        borderRadius: 4,
        yAxisID: 'y'
      },
      {
        label: 'Clicks',
        data: clicks,
        type: 'line',
        borderColor: '#1D9E75',
        backgroundColor: 'transparent',
        pointBackgroundColor: '#1D9E75',
        pointRadius: 4,
        tension: 0.3,
        yAxisID: 'y2'
      }
    ]
  },
  plugins: [gbpLinePlugin],
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false }
    },
    scales: {
      x: {
        grid: { display: false },
        border: { display: false },
        ticks: { font: { size: 12 }, color: '#888780' }
      },
      y: {
        position: 'left',
        grid: { color: 'rgba(0,0,0,0.06)' },
        border: { display: false },
        ticks: { font: { size: 11 }, color: '#888780' },
        title: { display: true, text: 'Impressions', font: { size: 11 }, color: '#888780' }
      },
      y2: {
        position: 'right',
        grid: { display: false },
        border: { display: false },
        ticks: { font: { size: 11 }, color: '#888780' },
        title: { display: true, text: 'Clicks', font: { size: 11 }, color: '#888780' }
      }
    }
  }
});
</script>
</body>
</html>
